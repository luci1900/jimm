services:
  traefik:
    image: "traefik:v2"
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8089:8080"
    volumes:
      - ./local/traefik/traefik.yaml:/etc/traefik/traefik.yaml
      - ./local/traefik/certs:/certs/
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: 
        - CMD
        - traefik
        - healthcheck
      interval: 10s
      timeout: 5s
      retries: 3
    
  # An instance of JIMM used in integration tests, pulled from a tag.
  jimm-test:
    extends:
      file: docker-compose.common.yaml
      service: jimm-base
    image: ghcr.io/canonical/jimm:${JIMM_VERSION:-latest}
    profiles: ["test"]
    container_name: jimm-test
    ports:
      - 17070:80
    volumes:
      - ./internal/testutils/jimmtest/testdata/jwks.json:/etc/jimm/jwks.json:ro
      - ./internal/testutils/jimmtest/testdata/jwks_private_key.pem:/etc/jimm/jwks_private_key.pem:ro
    entrypoint:
      - bash
      - -c
      - >-
        apt update && apt install curl -y
        && /usr/local/bin/jimmsrv

  # An instance of JIMM used for dev, built from source with hot-reloading.
  jimm-dev:
    extends:
      file: docker-compose.common.yaml
      service: jimm-base
    # In order to switch the target image you need to run compose with --build
    # Changing target is mainly useful in CI, so local environments can just rely on the default.
    build:
      context: ./local/jimm/
      dockerfile: Dockerfile
      target: ${JIMM_TARGET:-dev}
    profiles: ["dev"]
    # working_dir value has to be the same of mapped volume
    hostname: jimm.localhost
    working_dir: /jimm
    container_name: jimm
    ports:
      - 17070:80
      - 17022:17022
      - 17090:9090
      - 2346:2346
    volumes:
      - ./:/jimm/
      - ./internal/testutils/jimmtest/testdata/jwks.json:/etc/jimm/jwks.json:ro
      - ./internal/testutils/jimmtest/testdata/jwks_private_key.pem:/etc/jimm/jwks_private_key.pem:ro
      - go-modules:/go/pkg/mod # cache modules to improve startup
      - go-cache:/root/.cache/go-build # cache build's artifacts to startup

  db:
    image: postgres
    container_name: postgres
    restart: on-failure
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: jimm
      POSTGRES_USER: jimm
      POSTGRES_PASSWORD: jimm
    # Since it's mainly used for testing purposes, it's okay to set fsync=off for
    # improved performance.
    command: -c fsync=off -c full_page_writes=off -c max_connections=200
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jimm" ]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.21
    container_name: vault
    ports:
      - 8200:8200
    environment:
      VAULT_ADDR: "http://localhost:8200"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "root"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./local/vault/policy.hcl:/vault/policy.hcl
      - ./local/vault/entrypoint.sh:/vault/entrypoint.sh
    entrypoint: ["/vault/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "[ -f /tmp/healthy ]"]
      start_period: 5s
      interval: 1s
      timeout: 1s
      retries: 30

  openfga:
    build:
      context: ./local/openfga/
      dockerfile: Dockerfile
    container_name: openfga
    environment:
      OPENFGA_AUTHN_METHOD: "preshared"
      OPENFGA_AUTHN_PRESHARED_KEYS: "jimm"
      OPENFGA_DATASTORE_ENGINE: "postgres"
      OPENFGA_DATASTORE_URI: "postgresql://jimm:jimm@db/jimm?sslmode=disable"
      OPENFGA_LOG_LEVEL: "warn"
    volumes:
      - ./openfga/authorisation_model.fga:/app/authorisation_model.fga
    ports:
      - 8080:8080
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy

  keycloak:
    image: docker.io/bitnamilegacy/keycloak:23
    container_name: keycloak
    hostname: keycloak.localhost
    environment:
      KEYCLOAK_HTTP_PORT: 8082
      KEYCLOAK_ENABLE_HEALTH_ENDPOINTS: true
      KEYCLOAK_CREATE_ADMIN_USER: true
      KEYCLOAK_ADMIN_USER: jimm
      KEYCLOAK_ADMIN_PASSWORD: jimm
      KEYCLOAK_DATABASE_VENDOR: dev-file
      KEYCLOAK_EXTRA_ARGS: "-Dkeycloak.migration.action=import -Dkeycloak.migration.provider=singleFile -Dkeycloak.migration.file=/bitnami/keycloak/data/import/realm.json -Dkeycloak.migration.replace-placeholders=true -Dkeycloak.profile.feature.upload_scripts=enabled"
    volumes:
      - ./local/keycloak/jimm-realm.json:/bitnami/keycloak/data/import/realm.json:ro
    ports:
      - "8082:8082"
    healthcheck:
      # Ensure we only return exit code 0 on Status 200 https://www.keycloak.org/observability/health#_curl
      test: [ "CMD", "curl", "--head", "-fsS", "http://localhost:8082/health/ready" ]
      interval: 5s
      timeout: 10s
      retries: 30

  juju-dashboard:
    image: ${JUJU_DASHBOARD_IMAGE:-ghcr.io/canonical/juju-dashboard:0.15.1-beta.3}
    container_name: juju-dashboard
    profiles: ["dev"]
    environment:
      - DASHBOARD_CONTROLLER_URL=wss://jimm.localhost:443
      - DASHBOARD_IS_JUJU=false
    labels:
      traefik.enable: true
      traefik.http.routers.juju-dashboard.rule: Host(`juju-dashboard.localhost`)
      traefik.http.routers.juju-dashboard.entrypoints: websecure
      traefik.http.routers.juju-dashboard.tls: true
      traefik.http.services.juju-dashboard.loadbalancer.server.port: 8080

  jwks-server:
    image: nginx:alpine
    container_name: jwks-server
    volumes:
      - ./internal/testutils/jimmtest/testdata/jwks.json:/usr/share/nginx/html/.well-known/jwks.json:ro
    labels:
      traefik.enable: true
      traefik.http.routers.jwks-server.rule: Host(`jwks.localhost`)
      traefik.http.routers.jwks-server.entrypoints: websecure
      traefik.http.routers.jwks-server.tls: true
      traefik.http.services.jwks-server.loadbalancer.server.port: 80

volumes:
  go-modules:
  go-cache:
