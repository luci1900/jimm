name: E2E Test

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    name: E2E Tests with External Controller
    timeout-minutes: 60
    runs-on: [self-hosted-linux-amd64-jammy-large]
    steps:
      - name: Checkout JIMM repo
        uses: actions/checkout@v4

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/docker-images.tar
          key: docker-${{ runner.os }}-${{ hashFiles('docker-compose.yaml', 'docker-compose.common.yaml', 'local/*/Dockerfile') }}

      - name: Load Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images.tar

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Setup Go
        uses:  actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y gcc git-core gnupg build-essential

      - name: Install Juju
        run: |
          sudo snap install juju --channel=3.6/stable
          mkdir -p ~/.local/share/juju

      - name: Initialise LXD
        run: |
          sudo lxd waitready && \
          sudo lxd init --auto && \
          sudo chmod a+wr /var/snap/lxd/common/lxd/unix.socket && \
          lxc network set lxdbr0 ipv6.address none && \
          sudo usermod -a -G lxd $USER && \
          sudo iptables -F FORWARD && \
          sudo iptables -P FORWARD ACCEPT
      
      - name: Initialise Microk8s
        run: |
          sudo snap install microk8s --channel 1.32-strict
          sudo adduser $(whoami) snap_microk8s
          mkdir -p ~/.kube
          sudo chown -f -R $(whoami) ~/.kube
          sudo microk8s status --wait-ready
          sudo microk8s enable hostpath-storage dns
          sudo microk8s config > ~/.kube/config
          sudo usermod -a -G snap_microk8s ubuntu
          newgrp snap_microk8s
          juju add-k8s microk8s-cp --client
      
      - name: Generate certs
        working-directory: local/traefik/certs
        run: ./certs.sh

      - name: Start test environment
        run: docker compose up -d --wait

      - name: Bootstrap controller with JWKS endpoint 1
        run: |
          JWKS_DNS=jwks.localhost CONTROLLER_NAME=test-e2e-1 ./local/jimm/setup-controller.sh
      
      - name: Bootstrap controller with JWKS endpoint 2
        run: |
          JWKS_DNS=jwks.localhost CONTROLLER_NAME=test-e2e-2 ./local/jimm/setup-controller.sh

      - name: Generate controller config
        run: CONTROLLERS=test-e2e-1,test-e2e-2 make generate-test-env-multiple
      
      - name: Proxy traffic from lxd to host for k8s api server
        run: |
          host_ip_addr=$(ip route get 1.1.1.1 | awk '{print $7; exit}')
          lxc list --format json | jq -r '.[].name' | while read lxc_name; do
            lxc config device add $lxc_name k8sproxy-$lxc_name proxy \
              listen=tcp:127.0.0.1:16443 \
              connect=tcp:$host_ip_addr:16443 \
              bind=container
          done

      - name: Run E2E tests
        run: go test -v ./testing/... -timeout 30m
        env:
          RUN_E2E_TESTS: "1"
          JIMM_MICROK8S_TEST_CLOUD_NAME: "microk8s-cp"
          JIMM_BACKING_CONTROLLER_CONFIG: ${{ github.workspace }}/controllers.yaml
