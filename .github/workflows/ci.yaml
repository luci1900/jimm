name: CI
on:
  pull_request:
  workflow_call:
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y gcc git-core gnupg build-essential

      - name: Install juju-db
        run: sudo snap install juju-db --channel 4.4/stable

      - name: Start test environment
        run: docker compose up -d --wait

      - name: Run OpenFGA authorisation model tests
        uses: openfga/action-openfga-test@v0.1.0
        with:
          store-file-path: ./openfga/tests.fga.yaml

      - name: Build and Test
        run: TEST_LOGGING_CONFIG=ERROR go test -mod readonly ./... -timeout 1h -cover

  verify_generated:
    name: Verify generated artefacts are up to date
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"

      - name: Run generators
        shell: bash
        run: make generate

      - name: Ensure working tree is clean
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'make generate' and commit the results."
            exit 1
          fi
          test -z "$(git status --porcelain)" # Check for uncommitted changes

  verify_jaas_commands:
    name: Verify JAAS command symlinks
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"

      - name: Build JAAS binary
        shell: bash
        run: go build ./cmd/jaas

      - name: Verify JAAS command symlinks
        shell: bash
        run: ./scripts/verify_jaas_commands.sh
