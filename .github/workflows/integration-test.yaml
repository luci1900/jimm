name: Integration Test

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  startjimm:
    name: Test JIMM with Juju controller
    runs-on: [self-hosted-linux-amd64-jammy-large]
    steps:
      - name: Checkout JIMM repo
        uses: actions/checkout@v4

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache/restore@v5
        with:
          path: docker-images.tar
          key: docker-v2-${{ runner.os }}-${{ hashFiles('docker-compose.yaml', 'docker-compose.common.yaml') }}

      - name: Load Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i docker-images.tar

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Set up Microk8s
        run: |
          sudo snap install microk8s --classic
          sudo usermod -a -G microk8s "$USER"
          newgrp microk8s

          # Configure DockerHub mirror if provided
          if [[ "${DOCKERHUB_MIRROR}" ]]; then
            echo "Configuring DockerHub mirror: $DOCKERHUB_MIRROR"
            sudo tee /var/snap/microk8s/current/args/certs.d/docker.io/hosts.toml > /dev/null << EOF
          server = "$DOCKERHUB_MIRROR"

          [host."$DOCKERHUB_MIRROR"]
              capabilities = ["pull", "resolve"]
          EOF
            cat /var/snap/microk8s/current/args/certs.d/docker.io/hosts.toml

            microk8s stop
            microk8s start
          fi

          sudo microk8s enable storage
          subnet="$(ip route get 1 | head -n 1 | awk '{print $7}' | awk -F. '{print $1 "." $2 "." $3 ".240/24"}')"
          echo "MetalLB subnet: $subnet"
          sudo microk8s enable metallb:"$subnet"
          echo "Microk8s setup complete"

      - name: Setup Go
        uses:   actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Go vendor to speed up docker build
        run: go mod vendor

      - name: Start JIMM
        uses: ./.github/actions/test-server
        id: jaas
        with:
          jimm-version: dev
          juju-channel: "3.6/stable"
          ghcr-pat: ${{ secrets.GITHUB_TOKEN }}

      # Build the JAAS plugin to test any changes made 
      # to it instead of using the snap version.
      - name: Build JAAS plugin
        run: go build ./cmd/jaas/

      - name: Run integration tests
        run: ./tests/run-tests.sh
        env:
          BACKING_CONTROLLER_NAME: ${{ steps.jaas.outputs.backing-controller-name }}
          JIMM_CONTROLLER_NAME: ${{ steps.jaas.outputs.jimm-controller-name }}
      
      - name: Stop the application container
        run: docker stop jimm
  
      - name: Check logs for shutdown message
        run: |
          APP_CONTAINER=jimm
          LOGS=$(docker logs "$APP_CONTAINER" -n 20)
          echo "$LOGS"
          
          if echo "$LOGS" | grep -q "jimm shutdown complete"; then
            echo "Graceful shutdown confirmed."
          else
            echo "Graceful shutdown message not found!"
            exit 1
          fi

      - name: Print JIMM logs on failure
        if: failure()
        run: docker logs jimm
